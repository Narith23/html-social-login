<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Social Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-container d-flex align-items-center justify-content-center min-vh-100">
        <div class="login-card p-5 shadow-lg">
            <div class="text-center mb-4">
                <h1 class="fw-bold mb-2">Welcome Back</h1>
                <p class="text-muted">Please sign in to your account</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mb-4">Sign In</button>
            </form>

            <div class="divider d-flex align-items-center my-4">
                <hr class="flex-grow-1">
                <span class="mx-3">or continue with</span>
                <hr class="flex-grow-1">
            </div>

            <div class="d-grid gap-3" id="socialButtons">
                <button class="social-btn google-btn w-100" id="customGoogleBtn">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
                    Sign in with Google
                </button>

                <button class="btn btn-outline-dark social-btn d-flex align-items-center justify-content-center py-2"
                    id="facebookLogin">
                    <i class="bi bi-facebook me-2 text-primary"></i> Facebook
                </button>
                <button class="btn btn-outline-dark social-btn d-flex align-items-center justify-content-center py-2"
                    id="githubLogin">
                    <i class="bi bi-github me-2"></i> GitHub
                </button>
            </div>

            <div id="processingOverlay">
                <div class="loader"></div>
                <div class="processing-text">PROCESSING...</div>
            </div>

            <div class="response-card" id="responseContainer">
                <div class="fw-bold mb-2 text-primary">RESPONSE FROM GOOGLE:</div>
                <pre id="responseText" class="mb-0 overflow-auto" style="max-height: 200px;"></pre>
            </div>

            <div class="text-center mt-4">
                <p class="mb-0 text-muted">Don't have an account? <a href="#"
                        class="text-decoration-none text-primary fw-600">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
